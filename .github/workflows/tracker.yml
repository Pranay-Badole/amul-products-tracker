name: Amul Protein Tracker

on:
  # ── Scheduled runs ────────────────────────────────────────────────────────
  # Cron syntax (UTC time): minute hour day-of-month month day-of-week
  # Examples:
  #   Every 30 minutes:  */30 * * * *
  #   Every hour:        0 * * * *
  #   Every 15 minutes:  */15 * * * *
  # NOTE: GitHub Actions minimum reliable interval is ~15-30 minutes.
  # Anything more frequent may be delayed on busy runners.
  schedule:
    - cron: "*/30 * * * *"   # ← change this to adjust frequency

  # ── Manual trigger from GitHub UI ────────────────────────────────────────
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # kill if something hangs

    steps:
      # 1. Check out the repo (includes state.json from last run)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install Python dependencies
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # 4. Install Playwright's Chromium browser + system deps
      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      # 5. Run the tracker
      #    GMAIL_PASSWORD comes from GitHub Secrets (never stored in code)
      - name: Run tracker
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: python main.py --once

      # 6. Commit updated state.json back to repo so next run remembers statuses
      - name: Save state
        run: |
          git config --global user.name  "Amul Tracker Bot"
          git config --global user.email "amul-tracker-bot@users.noreply.github.com"
          git add state.json tracker.log 2>/dev/null || true
          git diff --staged --quiet && echo "No state changes." || \
            git commit -m "chore: update tracker state [skip ci]"
          git push origin HEAD || echo "Push skipped (no changes)"
